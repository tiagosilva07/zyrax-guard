name: CI
on:
  push: { branches: [develop, main] }
  pull_request: { branches: [develop, main] }
permissions: {}
jobs:
  test:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # pin: actions/checkout@v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # pin: actions/setup-go@v5
        with: { go-version: "1.26" }   # latest; go.mod's go 1.23 is the minimum supported
      - run: gofmt -l . | tee /dev/stderr | (! read)   # fail if any file unformatted
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - run: go test -run x -fuzz FuzzDamerau -fuzztime 20s ./internal/check/
