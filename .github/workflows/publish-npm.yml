name: Publish npm + MCP registry

# Publishes the npm wrapper (zyrax-guard + unscoped zyrax-guard-<platform>-<arch> packages)
# and the MCP registry listing (server.json) for a release tag.
#
# Triggers:
#   - workflow_run after the "Release" workflow completes. A GitHub Release created by a
#     workflow using GITHUB_TOKEN does NOT emit a release:published event that can start
#     other workflows, so we chain off the Release workflow's completion instead.
#   - workflow_dispatch to (re)publish a specific tag manually.
#
# REQUIREMENTS (publishing is intentionally gated — inert until these exist):
#   - repo secret NPM_TOKEN: an npm Automation token (personal account is fine — packages
#     are unscoped, no npm org required) with publish rights.
#   - MCP registry: GitHub OIDC (no secret needed; uses id-token below). The registry
#     trusts io.github.tiagosilva07/* from this repo's OIDC identity.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.8.0)"
        required: true
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  id-token: write   # npm provenance + MCP registry OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    # On workflow_run, only proceed when the Release workflow succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Resolve tag + gate on NPM_TOKEN
        id: gate
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          EVENT: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RUN_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -eu
          if [ "$EVENT" = "workflow_dispatch" ]; then TAG="$INPUT_TAG"; else TAG="$RUN_TAG"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -n "${NPM_TOKEN:-}" ] && [ -n "$TAG" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "NPM_TOKEN missing or tag empty (tag='$TAG') — skipping."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (release tag)
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # pin: actions/checkout@v5
        with:
          ref: ${{ steps.gate.outputs.tag }}

      - name: Set up Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # pin: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download release binaries
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.gate.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir dist --pattern 'zyrax-guard-*'

      - name: Stage npm packages
        if: steps.gate.outputs.enabled == 'true'
        env:
          TAG: ${{ steps.gate.outputs.tag }}
        run: |
          set -euo pipefail
          node scripts/build-npm.mjs "${TAG#v}" dist

      - name: Publish to npm (platform packages, then main; with provenance)
        if: steps.gate.outputs.enabled == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for d in npm/platforms/*/; do
            npm publish "$d" --access public --provenance
          done
          npm publish npm/zyrax-guard --access public --provenance

      - name: Install mcp-publisher (pinned + checksum-verified)
        if: steps.gate.outputs.enabled == 'true'
        env:
          # Pin the version and verify the checksum — never curl /releases/latest.
          # Runner is ubuntu-latest (linux/amd64). Bump both on upgrade:
          #   gh release download <ver> -R modelcontextprotocol/registry -p 'registry_*_checksums.txt'
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          set -euo pipefail
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher
          rm -f mcp-publisher.tar.gz

      - name: Stamp server.json version
        if: steps.gate.outputs.enabled == 'true'
        env:
          V: ${{ steps.gate.outputs.tag }}
        run: |
          set -euo pipefail
          node -e "const fs=require('fs');const v=process.env.V.replace(/^v/,'');const s=JSON.parse(fs.readFileSync('server.json','utf8'));s.version=v;s.packages[0].version=v;fs.writeFileSync('server.json',JSON.stringify(s,null,2)+'\n')"

      - name: Authenticate + publish to MCP registry (OIDC)
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
