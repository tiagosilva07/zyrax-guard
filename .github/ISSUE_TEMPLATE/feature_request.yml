name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where the current tool falls short.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your idea. Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Any workarounds you are currently using?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / commands
        - MCP server / agent integration
        - Shell hook
        - New ecosystem support
        - CI / GitHub Actions
        - Checks / verdict logic
        - Output formats (JSON, SARIF)
        - Performance
        - Documentation
        - Other
